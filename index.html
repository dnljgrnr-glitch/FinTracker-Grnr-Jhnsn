<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">

<style>
:root{
  --bg:#000;--card:#1c1c1e;--card2:#2c2c2e;--line:rgba(255,255,255,.09);
  --text:#fff;--muted:rgba(235,235,245,.72);--dim:rgba(235,235,245,.42);
  --blue:#0a84ff;--green:#30d158;--red:#ff453a;--amber:#ffd60a;--purple:#bf5af2;
  --max:1160px;--r:16px;--rs:11px;
}
*{box-sizing:border-box}
html{color-scheme:dark}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased}
body.pm .pv{filter:blur(5px);user-select:none;transition:filter .18s}body.pm .pv:hover{filter:none}
button,input,select{font:inherit}button{cursor:pointer}
input,select{width:100%;min-height:40px;border:1px solid transparent;border-radius:10px;background:rgba(255,255,255,.07);color:var(--text);padding:8px 10px;outline:none;font-variant-numeric:tabular-nums}select option{background:#1c1c1e;color:#fff}select:focus option,select option:checked,select option:hover{background:#2c2c2e;color:#fff}
input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(10,132,255,.2)}
label{font-size:.74rem;color:var(--dim);font-weight:800;letter-spacing:.02em}
.login{position:fixed;inset:0;z-index:1000;background:#000;display:grid;place-items:center;padding:24px}
.login.hidden{display:none}
.lock{width:min(390px,100%);text-align:center}
.lock h1{margin:0 0 5px;font-size:clamp(2.25rem,10vw,3.4rem);line-height:.9;letter-spacing:-.07em}
.lock p{margin:0 0 18px;color:var(--muted)}
.lock-card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;display:grid;gap:10px}
.err{min-height:18px;margin:0;color:var(--red);font-size:.82rem}
.btn{min-height:40px;border:0;border-radius:999px;background:rgba(255,255,255,.09);color:var(--muted);padding:0 13px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn.primary{background:var(--blue);color:#fff}.btn.green{background:var(--green);color:#041307}.btn.danger{background:rgba(255,69,58,.16);color:#ff9f99}.btn.small{min-height:32px;font-size:.8rem;padding:0 10px}
.top{position:sticky;top:0;z-index:50;background:rgba(0,0,0,.84);backdrop-filter:saturate(180%) blur(18px);border-bottom:1px solid var(--line)}
.top-in{max-width:var(--max);margin:auto;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.brand h2{margin:0;font-size:1.04rem;letter-spacing:-.03em}.brand p{margin:3px 0 0;color:var(--dim);font-size:.8rem}
.actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.saved{font-size:.74rem;color:var(--dim)}
.nav{position:sticky;top:62px;z-index:45;background:rgba(0,0,0,.88);backdrop-filter:saturate(180%) blur(18px);border-bottom:1px solid var(--line)}
.nav-in{max-width:var(--max);margin:auto;display:flex;gap:8px;overflow:auto;padding:9px 16px;scrollbar-width:none}.nav-in::-webkit-scrollbar{display:none}
.tab{min-height:36px;border:0;border-radius:999px;background:transparent;color:var(--muted);padding:0 14px;font-weight:850}.tab.active{background:var(--blue);color:#fff}
main{max-width:var(--max);margin:auto;padding:16px 16px 42px}.panel{display:none}.panel.active{display:block}
.grid{display:grid;gap:12px}.two{grid-template-columns:repeat(2,minmax(0,1fr))}.three{grid-template-columns:repeat(3,minmax(0,1fr))}.four{grid-template-columns:repeat(4,minmax(0,1fr))}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;box-shadow:0 2px 20px rgba(0,0,0,.35)}
.card h2,.card h3{margin:0 0 10px;letter-spacing:-.035em}.card h2{font-size:1.1rem}.card h3{font-size:.98rem}
.kicker{margin:0 0 5px;color:var(--dim);text-transform:uppercase;letter-spacing:.09em;font-size:.7rem;font-weight:900}
.fine{color:var(--dim);font-size:.82rem;line-height:1.42}.muted{color:var(--muted)}
.row{display:flex;justify-content:space-between;align-items:center;gap:10px}.wrap{flex-wrap:wrap}.stack{display:grid;gap:10px}
.hero{font-size:clamp(2.35rem,8vw,4.6rem);font-weight:900;letter-spacing:-.07em;line-height:.9;font-variant-numeric:tabular-nums}
.stat{font-size:clamp(1.12rem,2.5vw,1.75rem);font-weight:875;letter-spacing:-.045em;font-variant-numeric:tabular-nums;overflow-wrap:anywhere;line-height:1.05}.mini{font-size:1.03rem;font-weight:850;font-variant-numeric:tabular-nums;overflow-wrap:anywhere;line-height:1.08}
.blue{color:var(--blue)}.green{color:var(--green)}.red{color:var(--red)}.amber{color:var(--amber)}
.tile{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05);border-radius:13px;padding:11px}
.label{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);font-weight:900;margin-bottom:4px}
.bar{height:10px;background:rgba(255,255,255,.09);border-radius:999px;overflow:hidden;position:relative}.fill{height:100%;border-radius:999px;background:var(--blue)}
.fill.green{background:var(--green)}.fill.red{background:var(--red)}.fill.amber{background:var(--amber)}
.combo{height:13px}.seg{height:100%;position:absolute;top:0}.seg.d{left:0;background:var(--blue)}.seg.s{background:var(--green)}
.pill{display:inline-flex;align-items:center;min-height:25px;border-radius:999px;padding:0 9px;font-size:.74rem;font-weight:900;background:rgba(255,255,255,.08);color:var(--muted);font-variant-numeric:tabular-nums}
.pill.blue{background:rgba(10,132,255,.16);color:#8fc7ff}.pill.green{background:rgba(48,209,88,.14);color:#78e693}.pill.red{background:rgba(255,69,58,.15);color:#ff9f99}.pill.amber{background:rgba(255,214,10,.14);color:#ffe370}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}.dot.d{background:var(--blue)}.dot.s{background:var(--green)}
.cap-card{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.06);border-radius:13px;padding:10px}.cap-compact{gap:6px}.cap-compact .cap-head{margin-bottom:4px}.cap-compact .bar{height:8px}.cap-compact strong{font-size:.92rem}.flow-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.flow-grid .tile{min-width:0}.flow-grid .stat{font-size:clamp(1rem,2.1vw,1.45rem)}
.cap-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:8px}
.tight{display:grid;gap:6px}.alloc-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.88rem}.alloc-row:last-child{border-bottom:0}.start-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.cap-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.055)}.cap-row:last-child{border-bottom:0}.cap-row small{display:block;color:var(--dim);font-size:.72rem;margin-top:2px}.dti-scale{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.scale-seg{border-radius:10px;padding:8px;text-align:center;font-size:.72rem;font-weight:850;background:rgba(255,255,255,.055);color:var(--muted)}.scale-seg.good{border:1px solid rgba(48,209,88,.35)}.scale-seg.ok{border:1px solid rgba(255,214,10,.35)}.scale-seg.watch{border:1px solid rgba(255,149,0,.35)}.scale-seg.risk{border:1px solid rgba(255,69,58,.35)}
.field{display:grid;gap:5px}
.table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px}table{width:100%;min-width:620px;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;color:var(--muted);font-size:.87rem}th{color:#fff;background:rgba(255,255,255,.035);font-size:.7rem;text-transform:uppercase;letter-spacing:.08em}tr:last-child td{border-bottom:0}
details{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:10px}summary{cursor:pointer;color:var(--muted);font-weight:850}details p{margin:8px 0 0}.proj-grid{display:grid;gap:8px}.proj-row{display:grid;grid-template-columns:70px 1fr auto;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06)}.proj-row:last-child{border-bottom:0}.proj-meta{font-size:.76rem;color:var(--dim)}
.toastbox{position:fixed;right:16px;bottom:16px;z-index:1200;display:grid;gap:8px}.toast{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:10px 12px;box-shadow:0 6px 28px rgba(0,0,0,.55);transition:.25s}
.hidefile{display:none}
@media(max-width:900px){.top-in{align-items:flex-start;flex-direction:column}.actions{justify-content:flex-start}.nav{top:122px}.two,.three,.four,.start-grid{grid-template-columns:1fr}.hero{font-size:clamp(2.25rem,13vw,3.7rem)}.flow-grid{grid-template-columns:1fr 1fr}.flow-grid .tile:first-child{grid-column:1/-1}}
@media(max-width:520px){main{padding-inline:12px}.nav{top:154px}.card{padding:11px}.top-in{padding:12px}.saved{width:100%}.alloc-row,.cap-row{grid-template-columns:1fr auto}.flow-grid{grid-template-columns:1fr}.cap-head{align-items:flex-start}.pill{font-size:.7rem}.cap-card{padding:9px}.dti-scale{grid-template-columns:1fr 1fr}}
@media print{.login,.top,.nav,.actions,.btn,.toastbox{display:none!important}.panel{display:block!important}body{background:#fff;color:#000}.card{box-shadow:none;border:1px solid #ccc;background:#fff}.pv{filter:none!important}}

/* Safe anti-scroll controls */
.jump-chips{display:flex;gap:8px;overflow:auto;padding:2px 0 4px;scrollbar-width:none}
.jump-chips::-webkit-scrollbar{display:none}
.jump-chip{white-space:nowrap;border:1px solid var(--line);background:rgba(255,255,255,.055);border-radius:999px;padding:8px 10px;font-size:.78rem;font-weight:850;color:var(--text);text-decoration:none}
.jump-chip:hover{background:rgba(255,255,255,.09)}
.section-toggle{margin:0;padding:0;background:transparent;border:0}
.section-toggle>summary{list-style:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:12px;border-radius:14px;padding:14px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.06);font-weight:900;color:var(--text)}
.section-toggle>summary::-webkit-details-marker{display:none}
.section-toggle>summary:after{content:'Open';font-size:.72rem;color:var(--muted);border:1px solid var(--line);border-radius:999px;padding:5px 8px}
.section-toggle[open]>summary:after{content:'Close'}
.section-toggle .card{margin-top:8px}
.mobile-action-bar{position:fixed;left:0;right:0;bottom:0;z-index:60;display:none;padding:8px 10px calc(8px + env(safe-area-inset-bottom));background:rgba(0,0,0,.86);backdrop-filter:blur(18px);border-top:1px solid var(--line)}
.mobile-action-bar .inner{max-width:1180px;margin:0 auto;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px}
.mobile-action-bar button{min-height:42px;border-radius:13px;font-size:.72rem;padding:7px 6px}
@media(max-width:720px){body{padding-bottom:76px}.mobile-action-bar{display:block}}
@media(max-width:520px){.jump-chip{font-size:.74rem;padding:7px 9px}}


/* Allocation chart */
.alloc-visual{display:grid;grid-template-columns:220px 1fr;gap:14px;align-items:center}
.donut-wrap{display:flex;justify-content:center;align-items:center}
.donut{
  --size:200px;
  width:var(--size);height:var(--size);position:relative;display:grid;place-items:center;
}
.donut svg{width:100%;height:100%;transform:rotate(-90deg)}
.donut-hole{
  position:absolute;inset:22%;border-radius:999px;
  background:#1c1c1e;border:1px solid rgba(255,255,255,.06);
  display:grid;place-items:center;text-align:center;padding:10px
}
.donut-hole strong{font-size:1.15rem;letter-spacing:-.03em}
.alloc-legend{display:grid;gap:8px}
.alloc-legend .legend-row{
  display:grid;grid-template-columns:12px 1fr auto auto;gap:10px;align-items:center;
  background:rgba(255,255,255,.04);padding:10px;border-radius:12px
}
.legend-dot{width:12px;height:12px;border-radius:999px}
@media(max-width:760px){
  .alloc-visual{grid-template-columns:1fr}
  .donut{--size:180px}
}


/* Get Started Guide */
.gsg-wrap{max-width:var(--max);margin:0 auto;}
.gsg-head{margin-bottom:14px;}
.gsg-title{font-size:1.25rem;font-weight:900;color:var(--text);margin:0 0 6px;letter-spacing:-.035em}
.gsg-intro{font-size:.86rem;color:var(--muted);line-height:1.55;margin:0 0 14px;}
.gsg-progwrap{display:flex;align-items:center;gap:12px;}
.gsg-bar{flex:1;height:10px;background:rgba(255,255,255,.09);border-radius:999px;overflow:hidden;}
.gsg-bar i{display:block;height:100%;width:0;background:var(--green);border-radius:999px;transition:width .25s;}
.gsg-proglabel{font-size:.78rem;font-weight:900;color:var(--muted);white-space:nowrap;}
.gsg-phase{background:var(--card);border:1px solid var(--line);border-radius:var(--r);margin-bottom:12px;overflow:hidden;border-left:5px solid var(--blue);box-shadow:0 2px 20px rgba(0,0,0,.24)}
.gsg-phase.locked{opacity:.52;}
.gsg-phead{padding:13px 15px;background:rgba(255,255,255,.035);}
.gsg-ptag{font-size:.64rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;}
.gsg-pt{font-size:1rem;font-weight:900;color:var(--text);margin:3px 0 0;letter-spacing:-.025em}
.gsg-pcount{float:right;font-size:.74rem;font-weight:900;color:var(--muted);}
.gsg-pnote{font-size:.76rem;color:var(--muted);line-height:1.5;margin-top:5px;}
.gsg-lockmsg{font-size:.72rem;font-weight:900;color:var(--amber);margin-top:7px;display:none;}
.gsg-phase.locked .gsg-lockmsg{display:block;}
.gsg-row{display:flex;align-items:flex-start;gap:11px;padding:10px 15px;border-top:1px solid rgba(255,255,255,.06);cursor:pointer;user-select:none;}
.gsg-row:hover{background:rgba(255,255,255,.04);}
.gsg-check{width:20px;height:20px;border:2px solid rgba(235,235,245,.42);border-radius:6px;position:relative;flex-shrink:0;margin-top:1px;transition:.15s;}
.gsg-row.done .gsg-check{background:var(--green);border-color:var(--green);}
.gsg-row.done .gsg-check:after{content:"";position:absolute;left:6px;top:2px;width:5px;height:10px;border:solid #06150a;border-width:0 2px 2px 0;transform:rotate(45deg);}
.gsg-label{font-size:.86rem;color:var(--text);line-height:1.45;}
.gsg-row.done .gsg-label{color:var(--dim);text-decoration:line-through;}
.gsg-ref{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px;margin-top:10px;}
.gsg-reftitle{font-size:.72rem;font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:var(--text);margin:16px 0 8px;}
.gsg-reftitle:first-child{margin-top:0;}
.gsg-refnote{font-weight:700;color:var(--muted);letter-spacing:0;text-transform:none;}
.gsg-djt{width:100%;border-collapse:collapse;font-size:.78rem;min-width:720px;}
.gsg-djt th{background:rgba(255,255,255,.06);color:var(--text);text-align:left;padding:8px 10px;font-size:.68rem;letter-spacing:.06em;text-transform:uppercase;border-bottom:1px solid var(--line)}
.gsg-djt td{padding:8px 10px;border-top:1px solid rgba(255,255,255,.055);color:var(--muted);}
.gsg-djt tr:nth-child(even){background:rgba(255,255,255,.025);}
.gsg-table-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px}
.gsg-mile{list-style:none;padding:0;margin:0;}
.gsg-mile li{font-size:.82rem;color:var(--muted);line-height:1.5;padding:4px 0 4px 16px;position:relative;}
.gsg-mile li:before{content:"";position:absolute;left:0;top:11px;width:7px;height:7px;border-radius:50%;background:var(--blue);}
.gsg-mile li b{color:var(--text);}
.gsg-key{font-size:.78rem;color:var(--muted);margin:10px 0 0;line-height:1.5;}
.gsg-reset{margin-top:14px;border:1px solid rgba(255,69,58,.6);background:rgba(255,69,58,.12);color:#ff9f99;font-size:.78rem;font-weight:900;padding:8px 14px;border-radius:999px;cursor:pointer;}
.gsg-location-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
@media(max-width:760px){.gsg-progwrap{display:grid}.gsg-location-grid{grid-template-columns:1fr}.gsg-djt{min-width:680px}}

</style>
</head>

function renderAllocDonut(p){

  const buffer = Math.max(0, amount - assigned);
  const data = keys.map((k,i)=>({label:k,pct:Number(alloc[k]||0),amt:amount*(Number(alloc[k]||0)/100),color:allocPieColors()[i%allocPieColors().length]}));

    const out = `<circle cx="60" cy="60" r="${radius}" fill="none" stroke="${d.color}" stroke-width="16" stroke-linecap="butt" stroke-dasharray="${len} ${circ-len}" stroke-dashoffset="${-offset}"></circle>`;

  const legend = data.map(d=>`<div class="legend-row"><span class="legend-dot" style="background:${d.color}"></span><span>${d.label}</span><span class="pill">${d.pct.toFixed(0)}%</span><strong class="pv">${money(d.amt)}</strong></div>`).join('');

function estimateMonthsToPayoff(balance,apr,monthlyPayment){
  if(!monthlyPayment||monthlyPayment<=0||balance<=0)return 0;
  const r=apr/100/12;
  if(r===0)return Math.ceil(balance/monthlyPayment);
  if(monthlyPayment<=balance*r)return 999;
  return Math.ceil(-Math.log(1-(r*balance/monthlyPayment))/Math.log(1+r));
}
function danielOutcomeProjection(){
  const alloc=J('alloc:daniel',DEFAULTS.daniel.alloc);
  const monthlyIncome=DANIEL_STATEMENT_BASELINE.incomeMonthly;
  const visa=debt('d0'), vehicle=debt('d1');
  const visaMonthly=monthlyIncome*(Number(alloc['NFCU Visa']||0)/100);
  const vehicleMonthly=monthlyIncome*(Number(alloc['Vehicle loan']||0)/100);
  const savingsMonthly=monthlyIncome*(Number(alloc['Move/Emergency savings']||0)/100);
  const sharedTarget=sharedGoalTargetTotal();
  const sharedCurrent=sharedGoalTotal();
  return {
    visaMonthly,vehicleMonthly,savingsMonthly,
    visaMonths:estimateMonthsToPayoff(bal('d0'),visa.apr,visaMonthly),
    vehicleMonths:estimateMonthsToPayoff(bal('d1'),vehicle.apr,vehicleMonthly),
    sharedGoalMonths:savingsMonthly>0?Math.ceil(Math.max(0,sharedTarget-sharedCurrent)/savingsMonthly):0
  };
}

  return {
    daniel:inc('daniel')*(Number(dAlloc['Move/Emergency savings']||0)/100),

  };

function projectionAt(months){
  const plan=monthlyDebtPlan(), savePlan=monthlySavingsPlan();
  let debtNow=0, debtFuture=0, interestAvoided=0;
  allDebts().forEach(d=>{
    const b=bal(d.id), pay=Number(plan[d.id]||0), projected=Math.max(0,b-(pay*months));
    debtNow+=b; debtFuture+=projected; interestAvoided += Math.max(0,b-projected)*(d.apr/100/12);
  });
  const savingsFuture=allSavings().reduce((s,x)=>s+bal(x.id),0)+(savePlan.daniel+savePlan.sonia)*months;
  const wallet=persons.reduce((s,p)=>s+Number(J('w:'+p+':c',0))+Number(J('w:'+p+':s',0)),0);
  const nw=savingsFuture+wallet-debtFuture;
  return {months,debtFuture,savingsFuture,nw,interestAvoided};
}
function projectionTable(){
  const now=totals(), marks=[0,3,6,12,18,24,36];
  return `<div class="stack">
    <div class="grid three">
      <div class="tile"><div class="label">Current Net Worth</div><div class="${now.nw>=0?'green':'red'} mini pv">${money(now.nw)}</div></div>
      <div class="tile"><div class="label">Current Debt</div><div class="red mini pv">${money(now.debt)}</div></div>
      <div class="tile"><div class="label">Monthly Interest</div><div class="red mini pv">${money(now.burn)}</div></div>
    </div>
    <p class="fine">Projection uses current balances, saved income settings, and allocation percentages. It estimates where the plan should put you if you keep following the current monthly system.</p>
    <div class="proj-grid">
      ${marks.map(m=>{
        const p=m===0?{months:0,debtFuture:now.debt,savingsFuture:now.assets,nw:now.nw}:projectionAt(m);
        const progress=Math.max(0,Math.min(100,((now.debt-p.debtFuture)/Math.max(1,now.debt))*100));
        return `<div class="proj-row">
          <strong>${m===0?'Now':m+' mo'}</strong>
          <div>
            <div class="bar"><div class="fill green" style="width:${progress}%"></div></div>
            <div class="proj-meta pv">Debt ${money(p.debtFuture)} · assets/savings ${money(p.savingsFuture)}</div>
          </div>
          <strong class="${p.nw>=0?'green':'red'} pv">${money(p.nw)}</strong>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

function gsgTotalItems(){ var t=0; for (var i=0;i<GSG_PHASES.length;i++){ t+=GSG_PHASES[i].items.length; } return t; }
function gsgPhaseDone(phase, state){ for (var i=0;i<phase.items.length;i++){ if(!state[phase.items[i].id]) return false; } return true; }

function renderGuidePhases(){
  var state = gsgLoad();
  var html = '';
  var phase2Done = gsgPhaseDone(GSG_PHASES[1], state);
  for (var i=0;i<GSG_PHASES.length;i++){
    var ph = GSG_PHASES[i], doneCount = 0;
    for (var j=0;j<ph.items.length;j++){ if(state[ph.items[j].id]) doneCount++; }
    var locked = (ph.n >= 3 && !phase2Done) ? ' locked' : '';
    html += '<div class="gsg-phase'+locked+'" style="border-left-color:'+ph.color+'">';
    html += '<div class="gsg-phead">';
    html += '<span class="gsg-pcount">'+doneCount+'/'+ph.items.length+'</span>';
    html += '<div class="gsg-ptag" style="color:'+ph.color+'">PHASE '+ph.n+' · '+ph.tag+'</div>';
    html += '<div class="gsg-pt">'+ph.title+'</div>';
    html += '<div class="gsg-pnote">'+ph.note+'</div>';
    html += '<div class="gsg-lockmsg">Complete the Move Fund (Phase 2) first.</div>';
    html += '</div>';
    for (var k=0;k<ph.items.length;k++){
      var it = ph.items[k], done = state[it.id] ? ' done' : '';
      html += '<div class="gsg-row'+done+'" id="gsg-row-'+it.id+'" onclick="toggleGuideItem(\''+it.id+'\')">';
      html += '<span class="gsg-check"></span><span class="gsg-label">'+it.label+'</span>';
      html += '</div>';
    }
    html += '</div>';
  }
  var target=document.getElementById('gsgPhases');
  if(target)target.innerHTML = html;
  updateGuideProgress();
}

function toggleGuideItem(id){
  var state = gsgLoad();
  state[id] = !state[id];
  gsgSave(state);
  renderGuidePhases();
}

function updateGuideProgress(){
  var state = gsgLoad(), total = gsgTotalItems(), done = 0;
  for (var i=0;i<GSG_PHASES.length;i++){
    for (var j=0;j<GSG_PHASES[i].items.length;j++){ if(state[GSG_PHASES[i].items[j].id]) done++; }
  }
  var pct = total ? Math.round(done/total*100) : 0;
  var fill = document.getElementById('gsgBarFill');
  var lab = document.getElementById('gsgProgLabel');
  if (fill) fill.style.width = pct + '%';
  if (lab) lab.textContent = done + ' of ' + total + ' complete';
}

function gsgReset(){
  if (confirm('Reset the Get Started guide? This clears all checkmarks.')){
    try { localStorage.removeItem(GSG_KEY); } catch(e){}
    renderGuide();
  }
}
