<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta name="theme-color" content="#000000"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="description" content="GJ Financial — Private household financial planner"/>
  <title>GJ Financial</title>
  <link rel="stylesheet" href="css/styles.css"/>
</head>
<body>

  <!-- LOGIN -->
  <div id="login" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
    <div class="login-card">
      <div class="login-logo" aria-hidden="true">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect width="48" height="48" rx="12" fill="#0a84ff"/>
          <path d="M16 24h16M24 16v16" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h1 id="loginTitle">GJ Financial</h1>
      <p>Enter your passcode to continue</p>
      <form id="loginForm" novalidate>
        <div class="login-field">
          <label for="pwInput" class="sr-only">Passcode</label>
          <input id="pwInput" type="password" placeholder="Passcode"
            autocomplete="current-password" inputmode="text"
            aria-required="true" aria-describedby="pwError"/>
        </div>
        <button type="submit" class="btn-primary btn-full">Unlock</button>
        <p id="pwError" class="login-error" role="alert" aria-live="assertive"></p>
      </form>
      <p class="login-note">Client-side only · No data leaves this device</p>
    </div>
  </div>

  <!-- APP SHELL -->
  <div id="app" hidden>

    <header class="app-header">
      <div class="header-left">
        <svg class="header-logo" width="22" height="22" viewBox="0 0 48 48" fill="none" aria-hidden="true">
          <rect width="48" height="48" rx="12" fill="#0a84ff"/>
          <path d="M16 24h16M24 16v16" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
        <span class="header-title">GJ Financial</span>
      </div>
      <div class="header-right">
        <span id="lastSaved" class="header-saved" aria-live="polite"></span>
        <button id="privBtn" class="btn-icon" aria-pressed="false" title="Toggle privacy">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" id="eyeIcon">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
        <button id="printBtn" class="btn-icon" title="Print">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/>
          </svg>
        </button>
        <button id="lockBtn" class="btn-icon" title="Lock">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </button>
      </div>
    </header>

    <nav class="tab-bar" role="tablist" aria-label="App sections">
      <button class="tab active" role="tab" aria-selected="true"  data-tab="dashboard">Dashboard</button>
      <button class="tab"        role="tab" aria-selected="false" data-tab="daniel">Daniel</button>
      <button class="tab"        role="tab" aria-selected="false" data-tab="sonia">Sonia</button>
      <button class="tab"        role="tab" aria-selected="false" data-tab="household">Household</button>
      <button class="tab"        role="tab" aria-selected="false" data-tab="planning">Planning</button>
      <button class="tab"        role="tab" aria-selected="false" data-tab="settings">Settings</button>
    </nav>

    <main id="main-content">
      <section id="panel-dashboard" class="panel"        role="tabpanel" tabindex="-1"></section>
      <section id="panel-daniel"    class="panel hidden" role="tabpanel" tabindex="-1"></section>
      <section id="panel-sonia"     class="panel hidden" role="tabpanel" tabindex="-1"></section>
      <section id="panel-household" class="panel hidden" role="tabpanel" tabindex="-1"></section>
      <section id="panel-planning"  class="panel hidden" role="tabpanel" tabindex="-1"></section>
      <section id="panel-settings"  class="panel hidden" role="tabpanel" tabindex="-1"></section>
    </main>

  </div><!-- /#app -->

  <!-- Toast notification container -->
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script src="js/app.js"></script>
</body>
</html>
