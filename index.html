<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#000000">
<title>Daniel & Sonia Financial OS</title>
<style>
:root{
  --bg:#000;--card:#1c1c1e;--card2:#2c2c2e;--line:rgba(255,255,255,.09);
  --text:#fff;--muted:rgba(235,235,245,.72);--dim:rgba(235,235,245,.42);
  --blue:#0a84ff;--green:#30d158;--red:#ff453a;--amber:#ffd60a;--purple:#bf5af2;
  --max:1160px;--r:16px;--rs:11px;
}
*{box-sizing:border-box}
html{color-scheme:dark}
body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased}
body.pm .pv{filter:blur(5px);user-select:none;transition:filter .18s}body.pm .pv:hover{filter:none}
button,input,select{font:inherit}button{cursor:pointer}
input,select{width:100%;min-height:40px;border:1px solid transparent;border-radius:10px;background:rgba(255,255,255,.07);color:var(--text);padding:8px 10px;outline:none;font-variant-numeric:tabular-nums}select option{background:#1c1c1e;color:#fff}select:focus option,select option:checked,select option:hover{background:#2c2c2e;color:#fff}
input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(10,132,255,.2)}
label{font-size:.74rem;color:var(--dim);font-weight:800;letter-spacing:.02em}
.login{position:fixed;inset:0;z-index:1000;background:#000;display:grid;place-items:center;padding:24px}
.login.hidden{display:none}
.lock{width:min(390px,100%);text-align:center}
.lock h1{margin:0 0 5px;font-size:clamp(2.25rem,10vw,3.4rem);line-height:.9;letter-spacing:-.07em}
.lock p{margin:0 0 18px;color:var(--muted)}
.lock-card{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:18px;display:grid;gap:10px}
.err{min-height:18px;margin:0;color:var(--red);font-size:.82rem}
.btn{min-height:40px;border:0;border-radius:999px;background:rgba(255,255,255,.09);color:var(--muted);padding:0 13px;font-weight:800;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn.primary{background:var(--blue);color:#fff}.btn.green{background:var(--green);color:#041307}.btn.danger{background:rgba(255,69,58,.16);color:#ff9f99}.btn.small{min-height:32px;font-size:.8rem;padding:0 10px}
.top{position:sticky;top:0;z-index:50;background:rgba(0,0,0,.84);backdrop-filter:saturate(180%) blur(18px);border-bottom:1px solid var(--line)}
.top-in{max-width:var(--max);margin:auto;padding:13px 16px;display:flex;justify-content:space-between;align-items:center;gap:12px}
.brand h2{margin:0;font-size:1.04rem;letter-spacing:-.03em}.brand p{margin:3px 0 0;color:var(--dim);font-size:.8rem}
.actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.saved{font-size:.74rem;color:var(--dim)}
.nav{position:sticky;top:62px;z-index:45;background:rgba(0,0,0,.88);backdrop-filter:saturate(180%) blur(18px);border-bottom:1px solid var(--line)}
.nav-in{max-width:var(--max);margin:auto;display:flex;gap:8px;overflow:auto;padding:9px 16px;scrollbar-width:none}.nav-in::-webkit-scrollbar{display:none}
.tab{min-height:36px;border:0;border-radius:999px;background:transparent;color:var(--muted);padding:0 14px;font-weight:850}.tab.active{background:var(--blue);color:#fff}
main{max-width:var(--max);margin:auto;padding:16px 16px 42px}.panel{display:none}.panel.active{display:block}
.grid{display:grid;gap:12px}.two{grid-template-columns:repeat(2,minmax(0,1fr))}.three{grid-template-columns:repeat(3,minmax(0,1fr))}.four{grid-template-columns:repeat(4,minmax(0,1fr))}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px;box-shadow:0 2px 20px rgba(0,0,0,.35)}
.card h2,.card h3{margin:0 0 10px;letter-spacing:-.035em}.card h2{font-size:1.1rem}.card h3{font-size:.98rem}
.kicker{margin:0 0 5px;color:var(--dim);text-transform:uppercase;letter-spacing:.09em;font-size:.7rem;font-weight:900}
.fine{color:var(--dim);font-size:.82rem;line-height:1.42}.muted{color:var(--muted)}
.row{display:flex;justify-content:space-between;align-items:center;gap:10px}.wrap{flex-wrap:wrap}.stack{display:grid;gap:10px}
.hero{font-size:clamp(2.35rem,8vw,4.6rem);font-weight:900;letter-spacing:-.07em;line-height:.9;font-variant-numeric:tabular-nums}
.stat{font-size:clamp(1.12rem,2.5vw,1.75rem);font-weight:875;letter-spacing:-.045em;font-variant-numeric:tabular-nums;overflow-wrap:anywhere;line-height:1.05}.mini{font-size:1.03rem;font-weight:850;font-variant-numeric:tabular-nums;overflow-wrap:anywhere;line-height:1.08}
.blue{color:var(--blue)}.green{color:var(--green)}.red{color:var(--red)}.amber{color:var(--amber)}
.tile{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05);border-radius:13px;padding:11px}
.label{font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;color:var(--dim);font-weight:900;margin-bottom:4px}
.bar{height:10px;background:rgba(255,255,255,.09);border-radius:999px;overflow:hidden;position:relative}.fill{height:100%;border-radius:999px;background:var(--blue)}
.fill.green{background:var(--green)}.fill.red{background:var(--red)}.fill.amber{background:var(--amber)}
.combo{height:13px}.seg{height:100%;position:absolute;top:0}.seg.d{left:0;background:var(--blue)}.seg.s{background:var(--green)}
.pill{display:inline-flex;align-items:center;min-height:25px;border-radius:999px;padding:0 9px;font-size:.74rem;font-weight:900;background:rgba(255,255,255,.08);color:var(--muted);font-variant-numeric:tabular-nums}
.pill.blue{background:rgba(10,132,255,.16);color:#8fc7ff}.pill.green{background:rgba(48,209,88,.14);color:#78e693}.pill.red{background:rgba(255,69,58,.15);color:#ff9f99}.pill.amber{background:rgba(255,214,10,.14);color:#ffe370}
.dot{width:10px;height:10px;border-radius:50%;display:inline-block}.dot.d{background:var(--blue)}.dot.s{background:var(--green)}
.cap-card{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.06);border-radius:13px;padding:10px}.cap-compact{gap:6px}.cap-compact .cap-head{margin-bottom:4px}.cap-compact .bar{height:8px}.cap-compact strong{font-size:.92rem}.flow-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.flow-grid .tile{min-width:0}.flow-grid .stat{font-size:clamp(1rem,2.1vw,1.45rem)}
.cap-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:8px}
.tight{display:grid;gap:6px}.alloc-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.88rem}.alloc-row:last-child{border-bottom:0}.start-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.cap-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.055)}.cap-row:last-child{border-bottom:0}.cap-row small{display:block;color:var(--dim);font-size:.72rem;margin-top:2px}.dti-scale{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.scale-seg{border-radius:10px;padding:8px;text-align:center;font-size:.72rem;font-weight:850;background:rgba(255,255,255,.055);color:var(--muted)}.scale-seg.good{border:1px solid rgba(48,209,88,.35)}.scale-seg.ok{border:1px solid rgba(255,214,10,.35)}.scale-seg.watch{border:1px solid rgba(255,149,0,.35)}.scale-seg.risk{border:1px solid rgba(255,69,58,.35)}
.field{display:grid;gap:5px}
.table-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:12px}table{width:100%;min-width:620px;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid var(--line);text-align:left;color:var(--muted);font-size:.87rem}th{color:#fff;background:rgba(255,255,255,.035);font-size:.7rem;text-transform:uppercase;letter-spacing:.08em}tr:last-child td{border-bottom:0}
details{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.06);border-radius:12px;padding:10px}summary{cursor:pointer;color:var(--muted);font-weight:850}details p{margin:8px 0 0}.proj-grid{display:grid;gap:8px}.proj-row{display:grid;grid-template-columns:70px 1fr auto;gap:10px;align-items:center;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.06)}.proj-row:last-child{border-bottom:0}.proj-meta{font-size:.76rem;color:var(--dim)}
.toastbox{position:fixed;right:16px;bottom:16px;z-index:1200;display:grid;gap:8px}.toast{background:var(--card2);border:1px solid var(--line);border-radius:12px;padding:10px 12px;box-shadow:0 6px 28px rgba(0,0,0,.55);transition:.25s}
.hidefile{display:none}
@media(max-width:900px){.top-in{align-items:flex-start;flex-direction:column}.actions{justify-content:flex-start}.nav{top:122px}.two,.three,.four,.start-grid{grid-template-columns:1fr}.hero{font-size:clamp(2.25rem,13vw,3.7rem)}.flow-grid{grid-template-columns:1fr 1fr}.flow-grid .tile:first-child{grid-column:1/-1}}
@media(max-width:520px){main{padding-inline:12px}.nav{top:154px}.card{padding:11px}.top-in{padding:12px}.saved{width:100%}.alloc-row,.cap-row{grid-template-columns:1fr auto}.flow-grid{grid-template-columns:1fr}.cap-head{align-items:flex-start}.pill{font-size:.7rem}.cap-card{padding:9px}.dti-scale{grid-template-columns:1fr 1fr}}
@media print{.login,.top,.nav,.actions,.btn,.toastbox{display:none!important}.panel{display:block!important}body{background:#fff;color:#000}.card{box-shadow:none;border:1px solid #ccc;background:#fff}.pv{filter:none!important}}
</style>
</head>
<body>
<div id="login" class="login">
  <div class="lock">
    <h1>D&amp;A</h1>
    <form id="loginForm" class="lock-card" novalidate>
      <select id="profileSelect" aria-label="Profile">
        <option value="daniel">Daniel</option>
        <option value="sonia">Sonia</option>
      </select>
      <input id="passwordInput" type="password" placeholder="Passcode" autocomplete="current-password" aria-label="Passcode">
      <button class="btn primary" type="submit">Unlock</button>
      <p id="loginError" class="err"></p>
    </form>
  </div>
</div>

<header class="top"><div class="top-in">
  <div class="brand"><h2>Daniel & Sonia Financial OS</h2><p id="activeUserLine">Household dashboard</p></div>
  <div class="actions"><span id="lastUpdated" class="saved"></span><button id="privacyBtn" class="btn">Hide $</button><button id="printBtn" class="btn">Print</button><button id="lockBtn" class="btn">Lock</button></div>
</div></header>
<nav class="nav"><div class="nav-in">
  <button class="tab active" data-tab="home">Home</button>
  <button class="tab" data-tab="daniel">Daniel</button>
  <button class="tab" data-tab="sonia">Sonia</button>
  <button class="tab" data-tab="household">Household</button>
  <button class="tab" data-tab="settings">Settings</button>
</div></nav>

<main>
<section id="home" class="panel active"></section>
<section id="daniel" class="panel"></section>
<section id="sonia" class="panel"></section>
<section id="household" class="panel"></section>
<section id="settings" class="panel"></section>
</main>
<div id="toastbox" class="toastbox"></div>

<script>
'use strict';
const PASS = 'JASPER';
const P={daniel:{name:'Daniel',cls:'blue',color:'var(--blue)'},sonia:{name:'Sonia',cls:'green',color:'var(--green)'}};
const DEFAULTS={
  daniel:{income:3200,alloc:{'Shared bills set-aside':25,'NFCU Visa':22,'Vehicle loan':13,'Move/Emergency savings':9,'Transportation':5,'Food/Personal':5},
    debts:[{id:'d0',label:'NFCU Visa',balance:9315.95,apr:17.5,min:452.82},{id:'d1',label:'Vehicle Loan',balance:22010.21,apr:9.14,min:426.20},{id:'d2',label:'Apple Card',balance:930.39,apr:20,min:50}],
    savings:[{id:'s0',label:'Move Fund',current:0,target:1950},{id:'s1',label:'Emergency Fund',current:0,target:5000}]},
  sonia:{income:2200,alloc:{'Shared bills set-aside':24,'NW Bank Loan':6,'Family Debt':9,'Emergency savings':5,'Transportation':6,'Food/Personal':6,'Personal spending':5},
    debts:[{id:'d3',label:'NW Bank Loan',balance:2266.02,apr:12.5,min:135.83},{id:'d4',label:'Family Debt',balance:10000,apr:0,min:200},{id:'d5',label:'Apple Card',balance:0,apr:20,min:0}],
    savings:[{id:'s2',label:'Move Fund',current:1000,target:2500},{id:'s3',label:'Sinking Fund',current:0,target:1000}]},
  categories:[{id:'transport',label:'Transportation',budget:300,note:'Gas, parking, oil, small vehicle-related costs'},{id:'food',label:'Food & Groceries',budget:450,note:'Groceries and baseline household food'},{id:'dining',label:'Eating Out',budget:140,note:'Fast food, coffee, restaurants, snacks'},{id:'personal',label:'Personal Spending',budget:250,note:'Amazon, beauty, clothes, personal items'},{id:'bills',label:'Phone / Insurance / Subscriptions',budget:285,note:'Verizon, Progressive, subscriptions'},{id:'household',label:'Household / Misc.',budget:150,note:'Cleaning, household items, small shared needs'}],
  bills:[{id:'rent',label:'Rent',amount:800},{id:'electric',label:'Electric',amount:150},{id:'internet',label:'Internet',amount:50},{id:'groceries',label:'Groceries',amount:300}],
  debtSequence:[['1','Move Fund','Finish liquidity first so the move does not create new debt.'],['2','NW Bank Loan','Clear Sonia’s 12.50% debt after the cash floor is safe.'],['3','NFCU Visa','Highest active revolving balance and high APR.'],['4','Family Debt','Keep consistent repayment rhythm and preserve trust.'],['5','Emergency Funds','Build both cash buffers.'],['6','Vehicle Loan','Longer-term payoff after high-interest pressure drops.']]
};
const persons=['daniel','sonia'];
const $=(s,r=document)=>r.querySelector(s), $$=(s,r=document)=>Array.from(r.querySelectorAll(s));
const money=n=>'$'+Number(n||0).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2}), clamp=(n,a,b)=>Math.max(a,Math.min(b,n)), pct=n=>(Number.isFinite(n)?n:0).toFixed(0)+'%';
const J=(k,d)=>{try{const v=JSON.parse(localStorage.getItem(k));return v??d}catch{return d}}, S=(k,v,q=false)=>{localStorage.setItem(k,JSON.stringify(v));localStorage.setItem('lastUpdated',JSON.stringify(new Date().toISOString()));last();if(!q)toast('Saved')};

function cats(){return DEFAULTS.categories.map(c=>({...c,label:J('cat:name:'+c.id,c.label),budget:Number(J('cb:'+c.id,c.budget)),note:J('cat:note:'+c.id,c.note)}))}
function bills(){return J('bills:list',DEFAULTS.bills)}
function debtList(p){return DEFAULTS[p].debts.map(d=>({...d,label:J('debt:name:'+d.id,d.label),apr:Number(J('apr:'+d.id,d.apr)),balance:Number(J('b:'+d.id,d.balance))}))}
function savingsList(p){return DEFAULTS[p].savings.map(s=>({...s,label:J('save:name:'+s.id,s.label),current:Number(J('b:'+s.id,s.current)),target:Number(J('g:'+s.id,s.target))}))}
function allDebts(){return persons.flatMap(p=>debtList(p).map(d=>({...d,person:p})))}
function allSavings(){return persons.flatMap(p=>savingsList(p).map(s=>({...s,person:p})))}
function debt(id){return allDebts().find(d=>d.id===id)}
function saving(id){return allSavings().find(s=>s.id===id)}
function bal(id){const d=debt(id), s=saving(id);return Number(J('b:'+id,d?.balance??s?.current??0))}
function goal(id){const d=debt(id), s=saving(id);return Number(J('g:'+id,d?.balance??s?.target??1))}
function inc(p){return Number(J('inc:'+p,DEFAULTS[p].income))}
function spent(p,id){return Number(J('cs:'+p+':'+id,0))}
function savedPeriod(p){return Number(J('sv:'+p,0))}
function log(p){return J('pay:'+p,[])}
function latestPay(p){const l=log(p);return l.length?Number(l[l.length-1].amount||0):0}
function activePeriod(p){return J('period:'+p,'No active period')}
function totalPay(){return persons.reduce((s,p)=>s+latestPay(p),0)}
function totalSpent(){return cats().reduce((s,c)=>s+persons.reduce((a,p)=>a+spent(p,c.id),0),0)}
function totalSaved(){return persons.reduce((s,p)=>s+savedPeriod(p),0)}
function sharedGoals(){
  return J('sharedGoals',[
    {id:'move',name:'Moving Goal',current:1000,target:1950},
    {id:'next',name:'Next Shared Goal',current:0,target:500}
  ]);
}
function sharedGoalTotal(){return sharedGoals().reduce((s,g)=>s+Number(g.current||0),0)}
function sharedGoalTargetTotal(){return sharedGoals().reduce((s,g)=>s+Number(g.target||0),0)}
function sharedGoalById(id){return sharedGoals().find(g=>g.id===id)}
function saveSharedGoals(list){S('sharedGoals',list,true)}

function minDebtPaymentTotal(p){
  return debtList(p).reduce((s,d)=>s+Number(d.min||0),0);
}
function dtiFor(p){
  const income=inc(p), minPay=minDebtPaymentTotal(p), ratio=income>0?(minPay/income*100):0;
  return {income,minPay,ratio};
}
function dtiClass(r){
  return r<20?'green':r<36?'amber':r<50?'amber':'red';
}
function dtiLabel(r){
  return r<20?'Strong':r<36?'Manageable':r<50?'Watch closely':'High risk';
}
function dtiSnapshot(){
  const d=dtiFor('daniel'), s=dtiFor('sonia'), combined={income:d.income+s.income,minPay:d.minPay+s.minPay};
  combined.ratio=combined.income>0?(combined.minPay/combined.income*100):0;
  const item=(name,x)=>`<div class="tile"><div class="label">${name}</div><div class="mini ${dtiClass(x.ratio)} pv">${x.ratio.toFixed(1)}%</div><p class="fine pv">${money(x.minPay)} monthly debt minimums / ${money(x.income)} income</p><span class="pill ${dtiClass(x.ratio)}">${dtiLabel(x.ratio)}</span></div>`;
  return `<div class="stack">
    <div class="grid three">${item('Daniel DTI',d)}${item('Sonia DTI',s)}${item('Combined DTI',combined)}</div>
    <div class="dti-scale">
      <div class="scale-seg good">Under 20%<br>Strong</div>
      <div class="scale-seg ok">20–35%<br>Manageable</div>
      <div class="scale-seg watch">36–49%<br>Watch</div>
      <div class="scale-seg risk">50%+<br>High risk</div>
    </div>
    <p class="fine">DTI here uses recorded monthly income and listed monthly debt minimums. As debt balances, minimums, or income change, this snapshot updates.</p>
  </div>`;
}

function householdPositionBlock(){
  const t=totals();
  return `<div class="grid four">
    <div class="tile"><div class="label">Assets</div><div class="mini green pv">${money(t.assets)}</div></div>
    <div class="tile"><div class="label">Debt</div><div class="mini red pv">${money(t.debt)}</div></div>
    <div class="tile"><div class="label">Net Worth</div><div class="mini ${t.nw>=0?'green':'red'} pv">${money(t.nw)}</div></div>
    <div class="tile"><div class="label">Interest Burn</div><div class="mini red pv">${money(t.burn)}</div></div>
  </div>`;
}
function categoryBudgetAdjustmentRows(){
  const list=cats().map(c=>{
    const used=persons.reduce((sum,p)=>sum+spent(p,c.id),0), left=c.budget-used;
    return {...c,used,left};
  });
  const over=list.filter(c=>c.left<0).reduce((s,c)=>s+Math.abs(c.left),0);
  const positive=list.filter(c=>c.left>0);
  const positiveTotal=positive.reduce((s,c)=>s+c.left,0);
  return `<div class="stack">
    ${over>0?`<div class="tile"><strong class="red pv">Over budget by ${money(over)}</strong><p class="fine">Suggested live correction: reduce the remaining category cushions below by this amount to stay neutral overall.</p></div>`:`<div class="tile"><strong class="green">No category overage recorded.</strong><p class="fine">Remaining cushions stay available.</p></div>`}
    ${list.map(c=>{
      let adj=0;
      if(over>0 && c.left>0 && positiveTotal>0) adj=over*(c.left/positiveTotal);
      const adjustedLeft=Math.max(0,c.left-adj), status=c.left<0?'red':adj>0?'amber':'green';
      return `<div class="cap-row">
        <div><strong>${c.label}</strong><small class="pv">Original left ${money(c.left)}${adj>0?' · suggested holdback '+money(adj):''}</small></div>
        <span class="pill ${status}">${c.left<0?'Over':'Adjusted'}</span>
        <strong class="${status} pv">${c.left<0?'Over '+money(Math.abs(c.left)):money(adjustedLeft)+' usable'}</strong>
      </div>`;
    }).join('')}
  </div>`;
}



function totalCap(){return cats().reduce((s,c)=>s+c.budget,0)}
function leftToSpend(){return totalPay()-totalSpent()-totalSaved()}
function totals(){const debt=allDebts().reduce((s,d)=>s+bal(d.id),0), sav=allSavings().reduce((s,x)=>s+bal(x.id),0), shared=sharedGoalTotal(), wallet=persons.reduce((s,p)=>s+Number(J('w:'+p+':c',0))+Number(J('w:'+p+':s',0)),0), assets=sav+shared+wallet;return{debt,assets,nw:assets-debt,burn:allDebts().reduce((s,d)=>s+bal(d.id)*(d.apr/100/12),0)}}
function toast(m){const b=$('#toastbox'),d=document.createElement('div');d.className='toast';d.textContent=m;b.appendChild(d);setTimeout(()=>{d.style.opacity=0;d.style.transform='translateY(4px)'},2200);setTimeout(()=>d.remove(),2700)}
function last(){const v=J('lastUpdated',null);$('#lastUpdated').textContent=v?'Saved '+new Date(v).toLocaleTimeString([],{hour:'numeric',minute:'2-digit'}):'Not saved yet'}
function table(h,r){return`<div class="table-wrap"><table><thead><tr>${h.map(x=>`<th>${x}</th>`).join('')}</tr></thead><tbody>${r.map(row=>`<tr>${row.map(c=>`<td class="${String(c).includes('$')?'pv':''}">${c}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`}
function bar(label,cur,max,cls='blue'){const r=clamp(cur/Math.max(1,max)*100,0,100), col=cls==='green'?'var(--green)':cls==='red'?'var(--red)':cls==='amber'?'var(--amber)':'var(--blue)';return`<div class="tile tight"><div class="row wrap"><strong>${label}</strong><span class="pill ${cls}">${pct(r)}</span></div><div class="bar"><div class="fill" style="width:${r}%;background:${col}"></div></div><div class="fine pv">${money(cur)} / ${money(max)}</div></div>`}

function renderHome(){
  $('#home').innerHTML=`<div class="grid two">

function monthlyDebtPlan(){
  const dAlloc=J('alloc:daniel',DEFAULTS.daniel.alloc), sAlloc=J('alloc:sonia',DEFAULTS.sonia.alloc);
  const dInc=inc('daniel'), sInc=inc('sonia');
  return {
    d0:dInc*(Number(dAlloc['NFCU Visa']||0)/100),
    d1:dInc*(Number(dAlloc['Vehicle loan']||0)/100),
    d2:0,
    d3:sInc*(Number(sAlloc['NW Bank Loan']||0)/100),
    d4:sInc*(Number(sAlloc['Family Debt']||0)/100),
    d5:0
  };
}
function monthlySavingsPlan(){
  const dAlloc=J('alloc:daniel',DEFAULTS.daniel.alloc), sAlloc=J('alloc:sonia',DEFAULTS.sonia.alloc);
  return {
    daniel:inc('daniel')*(Number(dAlloc['Move/Emergency savings']||0)/100),
    sonia:inc('sonia')*(Number(sAlloc['Emergency savings']||0)/100)
  };
}
function projectionAt(months){
  const plan=monthlyDebtPlan(), savePlan=monthlySavingsPlan();
  let debtNow=0, debtFuture=0, interestAvoided=0;
  allDebts().forEach(d=>{
    const b=bal(d.id), pay=Number(plan[d.id]||0), projected=Math.max(0,b-(pay*months));
    debtNow+=b; debtFuture+=projected; interestAvoided += Math.max(0,b-projected)*(d.apr/100/12);
  });
  const savingsFuture=allSavings().reduce((s,x)=>s+bal(x.id),0)+(savePlan.daniel+savePlan.sonia)*months;
  const wallet=persons.reduce((s,p)=>s+Number(J('w:'+p+':c',0))+Number(J('w:'+p+':s',0)),0);
  const nw=savingsFuture+wallet-debtFuture;
  return {months,debtFuture,savingsFuture,nw,interestAvoided};
}
function projectionTable(){
  const now=totals(), marks=[0,3,6,12,18,24,36];
  return `<div class="stack">
    <div class="grid three">
      <div class="tile"><div class="label">Current Net Worth</div><div class="${now.nw>=0?'green':'red'} mini pv">${money(now.nw)}</div></div>
      <div class="tile"><div class="label">Current Debt</div><div class="red mini pv">${money(now.debt)}</div></div>
      <div class="tile"><div class="label">Monthly Interest</div><div class="red mini pv">${money(now.burn)}</div></div>
    </div>
    <p class="fine">Projection uses current balances, saved income settings, and allocation percentages. It estimates where the plan should put you if you keep following the current monthly system.</p>
    <div class="proj-grid">
      ${marks.map(m=>{
        const p=m===0?{months:0,debtFuture:now.debt,savingsFuture:now.assets,nw:now.nw}:projectionAt(m);
        const progress=Math.max(0,Math.min(100,((now.debt-p.debtFuture)/Math.max(1,now.debt))*100));
        return `<div class="proj-row">
          <strong>${m===0?'Now':m+' mo'}</strong>
          <div>
            <div class="bar"><div class="fill green" style="width:${progress}%"></div></div>
            <div class="proj-meta pv">Debt ${money(p.debtFuture)} · assets/savings ${money(p.savingsFuture)}</div>
          </div>
          <strong class="${p.nw>=0?'green':'red'} pv">${money(p.nw)}</strong>
        </div>`;
      }).join('')}
    </div>
  </div>`;
}

    if(t.matches('[data-bill-name]')){const list=bills();list[Number(t.dataset.billName)].label=t.value;S('bills:list',list,true);refreshAll()}
    if(t.matches('[data-bill-amount]')){const list=bills();list[Number(t.dataset.billAmount)].amount=Number(t.value||0);S('bills:list',list,true);refreshAll()}
    if(t.matches('[data-shared-goal-name]')){const list=sharedGoals();list[Number(t.dataset.sharedGoalName)].name=t.value;saveSharedGoals(list);refreshAll()}
    if(t.matches('[data-shared-goal-current]')){const list=sharedGoals();list[Number(t.dataset.sharedGoalCurrent)].current=Number(t.value||0);saveSharedGoals(list);refreshAll()}
    if(t.matches('[data-shared-goal-target]')){const list=sharedGoals();list[Number(t.dataset.sharedGoalTarget)].target=Number(t.value||0);saveSharedGoals(list);refreshAll()}
    if(t.matches('[data-save-name]')){S('save:name:'+t.dataset.saveName,t.value,true);refreshAll()}
    if(t.matches('[data-save-goal]')){S('g:'+t.dataset.saveGoal,Number(t.value||0),true);refreshAll()}
    if(t.matches('[data-debt-name]')){S('debt:name:'+t.dataset.debtName,t.value,true);refreshAll()}
    if(t.matches('[data-debt-balance]')){S('b:'+t.dataset.debtBalance,Number(t.value||0),true);refreshAll()}
  });
  document.addEventListener('change',e=>{const t=e.target;if(t.id==='importFile'&&t.files[0]){const r=new FileReader();r.onload=()=>{try{const data=JSON.parse(r.result);Object.entries(data).forEach(([k,v])=>localStorage.setItem(k,JSON.stringify(v)));location.reload()}catch{toast('Import failed')}};r.readAsText(t.files[0])}});
}
function init(){
  if(J('pm',false)){document.body.classList.add('pm');$('#privacyBtn').textContent='Show $'}
  renderHome();renderPerson('daniel');renderPerson('sonia');renderHousehold();renderSettings();bind();refreshAll();
  const profile=sessionStorage.getItem('activeProfile')||J('lastProfile','daniel');$('#profileSelect').value=profile;
  if(sessionStorage.getItem('financeUnlocked')==='true'){$('#login').classList.add('hidden');showTab(profile)}
  else setTimeout(()=>$('#passwordInput')?.focus(),0);
}
init();
</script>
